name: Verify

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.24"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install backend
        run: uv sync --project backend --extra dev --frozen

      - name: Install frontend
        run: pnpm install --frozen-lockfile

      - name: Verify
        env:
          CODEATLAS_PYTHON: backend/.venv/bin/python
        run: pnpm run verify
